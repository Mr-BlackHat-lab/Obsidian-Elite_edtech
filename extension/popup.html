<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnPulse AI</title>
  <style>
    /* === Reset & base === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --lp-bg-0: #050b1b;
      --lp-bg-1: #08132e;
      --lp-bg-2: #0f2550;
      --lp-surface: rgba(15, 35, 76, 0.62);
      --lp-surface-strong: rgba(18, 43, 88, 0.8);
      --lp-border: rgba(145, 204, 255, 0.24);
      --lp-text-main: #e8f7ff;
      --lp-text-muted: #9db7d8;
      --lp-text-dim: #7f99bc;
      --lp-accent-cyan: #7cecff;
      --lp-accent-blue: #73b7ff;
      --lp-accent-violet: #b6acff;
      --lp-accent-pink: #ffabec;
      --lp-success: #66f5d0;
      --lp-warn: #ffd59b;
      --lp-danger: #ff9fbc;
      --lp-shadow: rgba(7, 14, 33, 0.55);
    }

    body {
      width: 320px;
      min-height: 200px;
      background: linear-gradient(160deg, var(--lp-bg-0), var(--lp-bg-1) 42%, var(--lp-bg-2));
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      color: var(--lp-text-main);
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: -40%;
      background:
        radial-gradient(circle at 12% 20%, rgba(124, 235, 255, 0.32), transparent 42%),
        radial-gradient(circle at 85% 18%, rgba(182, 172, 255, 0.28), transparent 38%),
        radial-gradient(circle at 30% 82%, rgba(95, 168, 255, 0.24), transparent 44%);
      filter: blur(18px);
      pointer-events: none;
      z-index: 0;
      animation: lp-drift 20s ease-in-out infinite alternate;
    }

    #popup-root {
      position: relative;
      z-index: 1;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(145, 204, 255, 0.38); border-radius: 4px; }

    @keyframes lp-drift {
      from { transform: translate(-6%, -4%) scale(1); }
      to { transform: translate(6%, 5%) scale(1.08); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .lp-popup-loading {
      padding: 32px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .lp-popup-spinner {
      animation: spin 0.75s linear infinite;
    }

    .lp-popup-shell {
      padding: 18px 18px 20px;
      margin: 10px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(16, 37, 77, 0.82), rgba(13, 31, 65, 0.7));
      border: 1px solid var(--lp-border);
      box-shadow:
        0 16px 32px -20px rgba(89, 162, 255, 0.8),
        inset 0 1px 0 rgba(188, 228, 255, 0.2),
        0 10px 30px var(--lp-shadow);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }

    .lp-popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .lp-popup-brand {
      font-size: 15px;
      font-weight: 800;
      background: linear-gradient(95deg, var(--lp-accent-cyan), var(--lp-accent-blue), var(--lp-accent-violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.3px;
      text-shadow: 0 0 14px rgba(124, 235, 255, 0.45);
    }

    .lp-popup-status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(150, 182, 220, 0.28);
      background: rgba(120, 152, 196, 0.2);
    }

    .lp-popup-status.is-active {
      background: rgba(102, 245, 208, 0.16);
      border-color: rgba(102, 245, 208, 0.45);
      box-shadow: 0 0 0 1px rgba(102, 245, 208, 0.18), 0 0 14px rgba(102, 245, 208, 0.25);
    }

    .lp-popup-status.is-disabled {
      background: rgba(255, 159, 188, 0.16);
      border-color: rgba(255, 159, 188, 0.45);
      box-shadow: 0 0 0 1px rgba(255, 159, 188, 0.18), 0 0 14px rgba(255, 159, 188, 0.28);
    }

    .lp-popup-status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #8fa8c9;
    }

    .lp-popup-status.is-active .lp-popup-status-dot {
      background: var(--lp-success);
      box-shadow: 0 0 9px var(--lp-success);
    }

    .lp-popup-status.is-disabled .lp-popup-status-dot {
      background: var(--lp-danger);
      box-shadow: 0 0 9px var(--lp-danger);
    }

    .lp-popup-status-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--lp-text-dim);
    }

    .lp-popup-status.is-active .lp-popup-status-label {
      color: var(--lp-success);
    }

    .lp-popup-status.is-disabled .lp-popup-status-label {
      color: var(--lp-danger);
    }

    .lp-extension-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .lp-extension-toggle-label {
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--lp-text-dim);
      font-weight: 700;
    }

    .lp-extension-toggle {
      min-width: 64px;
      padding: 5px 12px;
      border-radius: 999px;
      border: 2px solid transparent;
      background: rgba(17, 36, 70, 0.42);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.7px;
      cursor: pointer;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, color 0.18s ease;
    }

    .lp-extension-toggle.is-on {
      border-color: var(--lp-success);
      color: var(--lp-success);
      box-shadow: 0 0 12px rgba(102, 245, 208, 0.35);
    }

    .lp-extension-toggle.is-off {
      border-color: var(--lp-danger);
      color: var(--lp-danger);
      box-shadow: 0 0 12px rgba(255, 159, 188, 0.35);
    }

    .lp-tab-debug {
      border: 1px solid rgba(145, 204, 255, 0.2);
      border-radius: 10px;
      background: rgba(14, 31, 62, 0.42);
      padding: 8px 10px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .lp-tab-debug-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .lp-tab-debug-key {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--lp-text-dim);
    }

    .lp-tab-debug-value {
      font-size: 11px;
      font-weight: 700;
      color: var(--lp-text-muted);
      text-align: right;
    }

    .lp-tab-debug-value.tone-good {
      color: var(--lp-success);
    }

    .lp-tab-debug-value.tone-bad {
      color: var(--lp-danger);
    }

    .lp-tab-debug-value.tone-warn {
      color: var(--lp-warn);
    }

    .lp-tab-debug-value.tone-muted {
      color: var(--lp-text-muted);
    }

    .lp-tab-debug-note {
      margin-top: 1px;
      font-size: 10px;
      color: var(--lp-text-dim);
      line-height: 1.35;
    }

    .lp-popup-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124, 235, 255, 0.45), rgba(182, 172, 255, 0.32), transparent);
      margin-bottom: 18px;
    }

    .lp-popup-empty {
      text-align: center;
      padding: 20px 0;
    }

    .lp-popup-empty-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .lp-popup-empty-text {
      color: var(--lp-text-muted);
      font-size: 13px;
      line-height: 1.6;
      max-width: 200px;
      margin: 0 auto;
    }

    .lp-popup-footer {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid rgba(145, 204, 255, 0.18);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .lp-popup-version {
      font-size: 10px;
      color: var(--lp-text-dim);
    }

    .lp-reset-btn {
      background: none;
      border: 1px solid rgba(145, 204, 255, 0.35);
      border-radius: 6px;
      color: var(--lp-text-muted);
      font-size: 10px;
      padding: 3px 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .lp-reset-btn:hover {
      border-color: var(--lp-accent-pink);
      color: var(--lp-accent-pink);
      box-shadow: 0 0 10px rgba(255, 171, 236, 0.35);
    }

    .lp-dashboard {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .lp-dash-top {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .lp-ring {
      position: relative;
      width: 84px;
      height: 84px;
      flex-shrink: 0;
    }

    .lp-ring-svg {
      transform: rotate(-90deg);
    }

    .lp-ring-track {
      stroke: rgba(124, 169, 220, 0.28);
    }

    .lp-ring-fill {
      transition: stroke-dasharray 0.6s ease, stroke 0.4s ease;
    }

    .lp-ring-fill.tone-high { stroke: var(--lp-success); }
    .lp-ring-fill.tone-mid { stroke: var(--lp-accent-blue); }
    .lp-ring-fill.tone-low { stroke: var(--lp-accent-pink); }

    .lp-ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .lp-ring-value {
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
    }

    .lp-ring-value.tone-high { color: var(--lp-success); }
    .lp-ring-value.tone-mid { color: var(--lp-accent-blue); }
    .lp-ring-value.tone-low { color: var(--lp-accent-pink); }

    .lp-ring-label {
      font-size: 9px;
      color: var(--lp-text-dim);
      margin-top: 2px;
      letter-spacing: 0.5px;
    }

    .lp-dash-summary {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .lp-difficulty-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lp-difficulty-chip {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #fff;
    }

    .lp-difficulty-chip.tone-high {
      background: linear-gradient(100deg, #ff98cf, #ff7fd9);
      box-shadow: 0 0 10px rgba(255, 146, 214, 0.45);
    }

    .lp-difficulty-chip.tone-mid {
      background: linear-gradient(100deg, #95cbff, #7caefb);
      box-shadow: 0 0 10px rgba(124, 174, 251, 0.45);
    }

    .lp-difficulty-chip.tone-low {
      background: linear-gradient(100deg, #76f7ff, #63cbff);
      box-shadow: 0 0 10px rgba(118, 247, 255, 0.45);
    }

    .lp-next-level {
      font-size: 11px;
      color: var(--lp-text-muted);
    }

    .lp-streak-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(95deg, rgba(115, 183, 255, 0.18), rgba(182, 172, 255, 0.2));
      border: 1px solid rgba(145, 204, 255, 0.34);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      color: #d6d6ff;
      box-shadow: inset 0 1px 0 rgba(219, 235, 255, 0.24);
    }

    .lp-stats-row {
      display: flex;
      gap: 8px;
    }

    .lp-stat-card {
      flex: 1;
      background: var(--lp-surface);
      border: 1px solid var(--lp-border);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 8px 22px -18px rgba(101, 164, 242, 0.7);
    }

    .lp-stat-label {
      font-size: 10px;
      color: var(--lp-text-dim);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .lp-stat-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--lp-text-main);
      line-height: 1;
    }

    .lp-stat-value.accent-green { color: var(--lp-success); }
    .lp-stat-value.accent-red { color: var(--lp-danger); }

    .lp-progress-wrap {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .lp-progress-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 11px;
    }

    .lp-progress-label {
      color: var(--lp-text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .lp-progress-value {
      color: var(--lp-accent-cyan);
      font-weight: 700;
    }

    .lp-progress-meter {
      width: 100%;
      height: 6px;
      appearance: none;
      border: 0;
      border-radius: 6px;
      overflow: hidden;
      display: block;
    }

    .lp-progress-meter::-webkit-progress-bar {
      background: rgba(122, 164, 214, 0.2);
      border-radius: 6px;
    }

    .lp-progress-meter.tone-high::-webkit-progress-value {
      background: linear-gradient(90deg, #78ffdc, #4cd2ff);
    }

    .lp-progress-meter.tone-mid::-webkit-progress-value {
      background: linear-gradient(90deg, #93c6ff, #709cff);
    }

    .lp-progress-meter.tone-low::-webkit-progress-value {
      background: linear-gradient(90deg, #c8b6ff, #fface9);
    }

    .lp-weak-topics {
      background: var(--lp-surface-strong);
      border: 1px solid rgba(255, 213, 155, 0.32);
      border-radius: 10px;
      padding: 12px 14px;
      box-shadow: 0 10px 24px -20px rgba(255, 205, 130, 0.85);
    }

    .lp-weak-title {
      font-size: 10px;
      font-weight: 800;
      color: var(--lp-warn);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .lp-weak-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .lp-weak-tag {
      background: rgba(255, 213, 155, 0.08);
      border: 1px solid rgba(255, 213, 155, 0.32);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      color: #ffe2b4;
      font-weight: 600;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div id="popup-root"></div>
  <script src="dist/popup.js"></script>
</body>
</html>
