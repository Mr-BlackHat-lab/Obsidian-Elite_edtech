<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnPulse AI</title>
  <style>
    /* === Reset & base === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --lp-bg-0: #0f0f0f;
      --lp-bg-1: #151515;
      --lp-bg-2: #202020;
      --lp-surface: rgba(34, 34, 34, 0.9);
      --lp-surface-strong: rgba(42, 42, 42, 0.94);
      --lp-border: rgba(255, 255, 255, 0.12);
      --lp-text-main: #f1f1f1;
      --lp-text-muted: #b3b3b3;
      --lp-text-dim: #8f8f8f;
      --lp-accent-cyan: #f1f1f1;
      --lp-accent-blue: #d4d4d4;
      --lp-accent-violet: #bdbdbd;
      --lp-accent-pink: #ffffff;
      --lp-success: #d9d9d9;
      --lp-warn: #d6d6d6;
      --lp-danger: #ff6b6b;
      --lp-shadow: rgba(0, 0, 0, 0.6);
    }

    body {
      width: 320px;
      min-height: 200px;
      background: linear-gradient(180deg, var(--lp-bg-0), var(--lp-bg-1) 48%, var(--lp-bg-2));
      font-family: 'Roboto', 'Segoe UI', system-ui, sans-serif;
      color: var(--lp-text-main);
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: -40%;
      background:
        radial-gradient(circle at 14% 18%, rgba(255, 255, 255, 0.06), transparent 40%),
        radial-gradient(circle at 84% 82%, rgba(255, 255, 255, 0.05), transparent 46%);
      filter: blur(16px);
      pointer-events: none;
      z-index: 0;
      animation: lp-drift 20s ease-in-out infinite alternate;
    }

    #popup-root {
      position: relative;
      z-index: 1;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.24); border-radius: 4px; }

    @keyframes lp-drift {
      from { transform: translate(-6%, -4%) scale(1); }
      to { transform: translate(6%, 5%) scale(1.08); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .lp-popup-loading {
      padding: 32px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .lp-popup-spinner {
      animation: spin 0.75s linear infinite;
    }

    .lp-popup-shell {
      padding: 18px 18px 20px;
      margin: 10px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(28, 28, 28, 0.98), rgba(24, 24, 24, 0.96));
      border: 1px solid var(--lp-border);
      box-shadow:
        0 14px 30px -20px rgba(0, 0, 0, 0.9),
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 10px 30px var(--lp-shadow);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }

    .lp-popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .lp-popup-brand {
      font-size: 15px;
      font-weight: 800;
      background: linear-gradient(95deg, var(--lp-accent-cyan), var(--lp-accent-blue), var(--lp-accent-violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.3px;
      text-shadow: none;
    }

    .lp-popup-status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid rgba(150, 182, 220, 0.28);
      background: rgba(120, 152, 196, 0.2);
    }

    .lp-popup-status.is-active {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.22);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .lp-popup-status.is-disabled {
      background: rgba(255, 107, 107, 0.12);
      border-color: rgba(255, 107, 107, 0.35);
      box-shadow: 0 0 0 1px rgba(255, 107, 107, 0.12);
    }

    .lp-popup-status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #8fa8c9;
    }

    .lp-popup-status.is-active .lp-popup-status-dot {
      background: #f1f1f1;
      box-shadow: none;
    }

    .lp-popup-status.is-disabled .lp-popup-status-dot {
      background: var(--lp-danger);
      box-shadow: 0 0 9px var(--lp-danger);
    }

    .lp-popup-status-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--lp-text-dim);
    }

    .lp-popup-status.is-active .lp-popup-status-label {
      color: #f1f1f1;
    }

    .lp-popup-status.is-disabled .lp-popup-status-label {
      color: var(--lp-danger);
    }

    .lp-extension-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .lp-extension-toggle-label {
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--lp-text-dim);
      font-weight: 700;
    }

    .lp-extension-toggle {
      min-width: 64px;
      padding: 5px 12px;
      border-radius: 999px;
      border: 2px solid transparent;
      background: rgba(32, 32, 32, 0.9);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.7px;
      cursor: pointer;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, color 0.18s ease;
    }

    .lp-extension-toggle.is-on {
      border-color: var(--lp-success);
      color: var(--lp-success);
      box-shadow: 0 0 12px rgba(102, 245, 208, 0.35);
    }

    .lp-extension-toggle.is-off {
      border-color: var(--lp-danger);
      color: var(--lp-danger);
      box-shadow: 0 0 12px rgba(255, 159, 188, 0.35);
    }

    .lp-tab-debug {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      background: rgba(20, 20, 20, 0.92);
      padding: 8px 10px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .lp-tab-debug-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .lp-tab-debug-key {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--lp-text-dim);
    }

    .lp-tab-debug-value {
      font-size: 11px;
      font-weight: 700;
      color: var(--lp-text-muted);
      text-align: right;
    }

    .lp-tab-debug-value.tone-good {
      color: #f1f1f1;
    }

    .lp-tab-debug-value.tone-bad {
      color: var(--lp-danger);
    }

    .lp-tab-debug-value.tone-warn {
      color: #cccccc;
    }

    .lp-tab-debug-value.tone-muted {
      color: var(--lp-text-muted);
    }

    .lp-tab-debug-note {
      margin-top: 1px;
      font-size: 10px;
      color: var(--lp-text-dim);
      line-height: 1.35;
    }

    .lp-popup-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.18), transparent);
      margin-bottom: 18px;
    }

    .lp-popup-empty {
      text-align: center;
      padding: 20px 0;
    }

    .lp-popup-empty-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .lp-popup-empty-text {
      color: var(--lp-text-muted);
      font-size: 13px;
      line-height: 1.6;
      max-width: 200px;
      margin: 0 auto;
    }

    .lp-popup-footer {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .lp-popup-version {
      font-size: 10px;
      color: var(--lp-text-dim);
    }

    .lp-reset-btn {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: var(--lp-text-muted);
      font-size: 10px;
      padding: 3px 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .lp-reset-btn:hover {
      border-color: rgba(255, 255, 255, 0.42);
      color: #ffffff;
      box-shadow: none;
    }

    .lp-dashboard {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .lp-dash-top {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .lp-ring {
      position: relative;
      width: 84px;
      height: 84px;
      flex-shrink: 0;
    }

    .lp-ring-svg {
      transform: rotate(-90deg);
    }

    .lp-ring-track {
      stroke: rgba(255, 255, 255, 0.14);
    }

    .lp-ring-fill {
      transition: stroke-dasharray 0.6s ease, stroke 0.4s ease;
    }

    .lp-ring-fill.tone-high { stroke: #ffffff; }
    .lp-ring-fill.tone-mid { stroke: #d0d0d0; }
    .lp-ring-fill.tone-low { stroke: #9d9d9d; }

    .lp-ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .lp-ring-value {
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
    }

    .lp-ring-value.tone-high { color: #ffffff; }
    .lp-ring-value.tone-mid { color: #d0d0d0; }
    .lp-ring-value.tone-low { color: #9d9d9d; }

    .lp-ring-label {
      font-size: 9px;
      color: var(--lp-text-dim);
      margin-top: 2px;
      letter-spacing: 0.5px;
    }

    .lp-dash-summary {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .lp-difficulty-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lp-difficulty-chip {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #fff;
    }

    .lp-difficulty-chip.tone-high {
      background: linear-gradient(100deg, #f1f1f1, #dddddd);
      color: #1a1a1a;
      box-shadow: none;
    }

    .lp-difficulty-chip.tone-mid {
      background: linear-gradient(100deg, #cfcfcf, #b8b8b8);
      color: #101010;
      box-shadow: none;
    }

    .lp-difficulty-chip.tone-low {
      background: linear-gradient(100deg, #9e9e9e, #7f7f7f);
      color: #0f0f0f;
      box-shadow: none;
    }

    .lp-next-level {
      font-size: 11px;
      color: var(--lp-text-muted);
    }

    .lp-streak-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(95deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      color: #e6e6e6;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .lp-stats-row {
      display: flex;
      gap: 8px;
    }

    .lp-stat-card {
      flex: 1;
      background: var(--lp-surface);
      border: 1px solid var(--lp-border);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 8px 22px -20px rgba(0, 0, 0, 0.9);
    }

    .lp-stat-label {
      font-size: 10px;
      color: var(--lp-text-dim);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .lp-stat-value {
      font-size: 20px;
      font-weight: 800;
      color: var(--lp-text-main);
      line-height: 1;
    }

    .lp-stat-value.accent-green { color: #f1f1f1; }
    .lp-stat-value.accent-red { color: #ff7070; }

    .lp-progress-wrap {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .lp-progress-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 11px;
    }

    .lp-progress-label {
      color: var(--lp-text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .lp-progress-value {
      color: var(--lp-accent-cyan);
      font-weight: 700;
    }

    .lp-progress-meter {
      width: 100%;
      height: 6px;
      appearance: none;
      border: 0;
      border-radius: 6px;
      overflow: hidden;
      display: block;
    }

    .lp-progress-meter::-webkit-progress-bar {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 6px;
    }

    .lp-progress-meter.tone-high::-webkit-progress-value {
      background: linear-gradient(90deg, #f1f1f1, #dcdcdc);
    }

    .lp-progress-meter.tone-mid::-webkit-progress-value {
      background: linear-gradient(90deg, #d4d4d4, #b8b8b8);
    }

    .lp-progress-meter.tone-low::-webkit-progress-value {
      background: linear-gradient(90deg, #9f9f9f, #7f7f7f);
    }

    .lp-weak-topics {
      background: var(--lp-surface-strong);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 10px;
      padding: 12px 14px;
      box-shadow: 0 10px 24px -20px rgba(0, 0, 0, 0.9);
    }

    .lp-weak-title {
      font-size: 10px;
      font-weight: 800;
      color: var(--lp-warn);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .lp-weak-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .lp-weak-tag {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      color: #e0e0e0;
      font-weight: 600;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div id="popup-root"></div>
  <script src="dist/popup.js"></script>
</body>
</html>
