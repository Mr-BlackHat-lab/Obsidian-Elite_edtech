services:
  backend:
    build: ./backend
    container_name: learnpulse_backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
      if [ \"${BACKEND_RELOAD:-false}\" = \"true\" ]; then
        uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload;
      else
        uvicorn api.main:app --host 0.0.0.0 --port 8000;
      fi"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  celery:
    build: ./backend
    container_name: learnpulse_celery
    command: celery -A workers.celery_tasks worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-2}
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: on-failure

  mongo:
    image: mongo:7
    container_name: learnpulse_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: learnpulse_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mongo_data:
